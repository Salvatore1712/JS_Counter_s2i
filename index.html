<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=no">
    <title>JAVASCRIPT COUNTER</title>
    <link rel="stylesheet" href="./dist/css/main.css">

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- CONTAINE PRINCIPALE PAGINA -->
    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <h4 class="header__title-small">Benvenuto in</h4>
            <h1 class="header__title-big">CONTATORE</h1>
            <h3 class="header__title-medium">JavaScript</h3>
            
        </header>

        <!-- CONTENUTO PRINCIPALE -->
        <div class="main">

            <div class="main__info">
                <p class="main__info__text">Incrementa o decrementa il contatore</p>
            </div>

            <!-- div contenitore counter -->
            <div class="main__counter">
                <p class="main__counter__text"></p>
            </div>

            <!-- div contenitore bottoni -->
            <div class="main__button">
                <!-- <button class="btn">DECR</button>
                <button class="btn">INCR</button> -->
            </div>

            <!-- div contenitore bottone reset -->
            <div class="main__button__reset">
                <!-- <button class="reset">RESET</button> -->
            </div>

            <div class="extra">
                <!-- <button class="btn">+5</button>
                <button class="btn">+10</button> -->
            </div>
            <div class="punteggio">
                Punteggio massimo: <span class="punteggio__score"></span>
            </div>

            <div class="light">
                <button class="light__mode"><img src="./assets/img/sun_icon.png" alt="" class="light__mode__image">LIGHT MODE</button>
            </div>
            
        </div>
        <div class="footer">
            <a href="www.salvatorederoma.it">salvatorederoma.it</a><p>© 2026</p>
        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script type="module" src="./src/js/contatore.js?v=2" defer></script>
    <script src="./src/js/cambio_colore.js?v=2" defer></script>
</body>
</html>
